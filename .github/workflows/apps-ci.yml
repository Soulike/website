name: Apps CI

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install Dependencies
        run: bun install
      - name: Validate PR
        run: bun validate:pr
      - name: Test
        run: bun run test
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            blog:
              - 'apps/web/blog-vite/**'
              - 'modules/**'
              - 'libraries/**'
              - 'bun.lock'
            admin:
              - 'apps/web/admin-vite/**'
              - 'modules/**'
              - 'libraries/**'
              - 'bun.lock'
            game-2048:
              - 'apps/web/game-2048/**'
              - 'libraries/**'
              - 'bun.lock'
            auth-server:
              - 'apps/server/auth/**'
              - 'modules/**'
              - 'libraries/**'
              - 'bun.lock'
            auth-server-legacy:
              - 'apps/server/auth-legacy/**'
              - 'modules/**'
              - 'libraries/**'
              - 'bun.lock'
            admin-server-legacy:
              - 'apps/server/admin-legacy/**'
              - 'modules/**'
              - 'libraries/**'
              - 'bun.lock'
            blog-server-legacy:
              - 'apps/server/blog-legacy/**'
              - 'modules/**'
              - 'libraries/**'
              - 'bun.lock'
            database-server-legacy:
              - 'apps/server/database-legacy/**'
              - 'modules/**'
              - 'libraries/**'
              - 'bun.lock'
      - name: Build matrix
        id: build-matrix
        run: |
          matrix='[]'
          add() { matrix=$(echo "$matrix" | jq -c --arg t "$1" --arg p "$2" '. + [{"docker-build-target": $t, "docker-file-path": $p}]'); }

          [ "${{ steps.filter.outputs.blog }}" = "true" ] && add blog ./apps/web/blog-vite/Dockerfile
          [ "${{ steps.filter.outputs.admin }}" = "true" ] && add admin ./apps/web/admin-vite/Dockerfile
          [ "${{ steps.filter.outputs.game-2048 }}" = "true" ] && add game-2048 ./apps/web/game-2048/Dockerfile
          [ "${{ steps.filter.outputs.auth-server }}" = "true" ] && add auth-server ./apps/server/auth/Dockerfile
          [ "${{ steps.filter.outputs.auth-server-legacy }}" = "true" ] && add auth-server-legacy ./apps/server/auth-legacy/Dockerfile
          [ "${{ steps.filter.outputs.admin-server-legacy }}" = "true" ] && add admin-server-legacy ./apps/server/admin-legacy/Dockerfile
          [ "${{ steps.filter.outputs.blog-server-legacy }}" = "true" ] && add blog-server-legacy ./apps/server/blog-legacy/Dockerfile
          [ "${{ steps.filter.outputs.database-server-legacy }}" = "true" ] && add database-server-legacy ./apps/server/database-legacy/Dockerfile

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
  build:
    needs: [test, changes]
    if: needs.changes.outputs.matrix != '[]'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.matrix) }}
    uses: ./.github/workflows/docker-image-build-and-push.yml
    secrets: inherit
    with:
      docker-file-path: ${{ matrix.docker-file-path }}
      docker-build-target: ${{ matrix.docker-build-target }}
      push-to-registry: false
  ci-success:
    runs-on: ubuntu-latest
    if: always()
    needs: build
    steps:
      - name: Check for failures
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo Done!
