# Drop connections for unrecognized hosts (IP access, unknown domains, etc.)
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  listen 443 default_server ssl;
  listen [::]:443 default_server ssl;
  listen 443 default_server quic reuseport;
  listen [::]:443 default_server quic reuseport;
  return 444;
}

# Redirect all HTTP requests to HTTPS
server {
  server_name ~^(((.+)\.)?)soulike\.tech$;
  listen 80;
  listen [::]:80;
  return 301 https://$host$request_uri;
}

# Return 404 for unrecognized soulike.tech subdomains
server {
  server_name ~^(((.+)\.)?)soulike\.tech$;
  listen 443 ssl;
  listen [::]:443 ssl;
  listen 443 quic;
  listen [::]:443 quic;
  return 404;
}