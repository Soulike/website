server {
  server_name auth.soulike.tech;

  charset utf-8;
  access_log /dev/stdout main;

  location / {
    include /etc/nginx/proxy.conf;
    include /etc/nginx/security-headers.conf;
    include /etc/nginx/http3-headers.conf;
    proxy_pass http://auth-server:3000;
  }

  listen 443 ssl;
  listen [::]:443 ssl;
  listen 443 quic;
  listen [::]:443 quic;
}
